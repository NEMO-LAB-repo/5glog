<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generic 5G NR Handover Procedure</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
    }

    body {
      overflow: auto;
      font-family: Arial, Helvetica, sans-serif;
      color: #000000;
    }

    [hidden] {
      display: none !important;
    }

    .app-shell {
      min-height: 100vh;
      background: #ffffff;
    }

    .event-screen,
    .explorer-screen,
    .viewer-screen {
      min-height: 100vh;
      box-sizing: border-box;
    }

    .event-screen {
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .event-form {
      width: min(620px, 100%);
      display: grid;
      gap: 24px;
    }

    .home-actions {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .home-entry {
      height: 110px;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #ffffff;
      color: #000000;
      font-size: 34px;
      font-weight: 800;
      cursor: pointer;
    }

    .field-group {
      width: 100%;
    }

    .field-label {
      display: block;
      margin-bottom: 12px;
      font-size: 30px;
      font-weight: 800;
    }

    .event-field {
      width: 100%;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #ffffff;
      padding: 0 18px;
      color: #000000;
      font-size: 28px;
      font-weight: 700;
      cursor: pointer;
    }

    .event-field::after {
      content: "";
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 10px solid #000000;
    }

    .event-options {
      margin-top: 12px;
      border: 2px solid #000000;
      border-radius: 6px;
      overflow: hidden;
      background: #ffffff;
    }

    .event-option {
      width: 100%;
      height: 58px;
      border: 0;
      border-bottom: 1px solid #000000;
      background: #ffffff;
      color: #000000;
      padding: 0 18px;
      text-align: left;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
    }

    .event-option:last-child {
      border-bottom: 0;
    }

    .event-option:hover,
    .event-field:hover,
    .home-entry:hover,
    .column-button:hover,
    .back-button:hover {
      background: #f6f6f6;
    }

    .explorer-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
    }

    .explorer-screen.is-field-view {
      justify-content: flex-start;
    }

    .explorer-grid {
      width: min(620px, calc(100vw - 48px));
      min-height: 560px;
      display: grid;
      grid-template-columns: 1fr;
      border: 2px solid #000000;
      background: #ffffff;
    }

    .explorer-screen.is-field-view .explorer-grid {
      width: min(1380px, calc(100vw - 48px));
      min-height: min(820px, calc(100vh - 108px));
      resize: both;
      overflow: auto;
    }

    .explorer-column {
      padding: 28px;
      box-sizing: border-box;
    }

    .explorer-column.is-active {
      background: #fafafa;
    }

    .column-title {
      margin: 0 0 22px;
      font-size: 34px;
      font-weight: 800;
    }

    .column-list {
      display: grid;
      gap: 12px;
      max-height: 470px;
      overflow: auto;
    }

    .column-button {
      min-height: 54px;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #ffffff;
      color: #000000;
      padding: 10px 14px;
      text-align: left;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
    }

    .column-button.is-selected {
      background: #eeeeee;
    }

    .json-block {
      margin: 0;
      font-family: Menlo, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .json-block {
      font-size: 13px;
      line-height: 1.35;
    }

    .json-tree {
      font-family: Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.38;
      color: #000000;
    }

    .json-line {
      padding-left: calc(var(--depth) * 18px + 8px);
      border-left: 4px solid transparent;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .json-line.handover-hit {
      border-left-color: #e02828;
    }

    .json-line.field-hit {
      background: #fff0f0;
      border-left-color: #d60000;
      color: #b00000;
      font-weight: 800;
    }

    .json-key {
      font-weight: 700;
    }

    .field-list {
      display: grid;
      gap: 12px;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
      max-height: 470px;
      overflow: auto;
    }

    .explorer-screen.is-field-view .field-list {
      max-height: calc(100vh - 210px);
    }

    .field-item {
      border: 2px solid #000000;
      border-radius: 6px;
      padding: 10px 12px;
      overflow-wrap: anywhere;
    }

    .field-record-button {
      width: 100%;
      min-height: 52px;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #ffffff;
      color: #000000;
      padding: 10px 12px;
      text-align: left;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .field-record-button:hover {
      background: #f6f6f6;
    }

    .field-record-button.handover-field {
      border-left: 7px solid #d60000;
    }

    .field-match-title {
      border: 2px solid #000000;
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 22px;
      font-weight: 900;
      background: #ffffff;
    }

    .field-match-count {
      margin-top: 4px;
      color: #555555;
      font-size: 15px;
      font-weight: 700;
    }

    .field-index-back {
      width: fit-content;
      min-height: 42px;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #ffffff;
      color: #000000;
      padding: 8px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .field-index-back:hover {
      background: #f6f6f6;
    }

    .b821-structure {
      display: grid;
      gap: 12px;
    }

    .b821-note {
      border: 2px solid #000000;
      border-radius: 6px;
      padding: 10px 12px;
      background: #ffffff;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
    }

    .b821-table-wrap {
      overflow: auto;
      border: 2px solid #000000;
      border-radius: 6px;
      background: #ffffff;
    }

    .b821-table {
      width: 100%;
      min-width: 840px;
      border-collapse: collapse;
      font-size: 13px;
      line-height: 1.35;
      table-layout: fixed;
    }

    .b821-table th,
    .b821-table td {
      border-bottom: 1px solid #000000;
      border-right: 1px solid #000000;
      padding: 8px 10px;
      vertical-align: top;
      text-align: left;
    }

    .b821-table th:last-child,
    .b821-table td:last-child {
      border-right: 0;
    }

    .b821-table tr:last-child td {
      border-bottom: 0;
    }

    .b821-table th {
      background: #f4f4f4;
      font-weight: 900;
    }

    .b821-table th:nth-child(1),
    .b821-table td:nth-child(1) {
      width: 80px;
      text-align: center;
      white-space: nowrap;
    }

    .b821-table th:nth-child(2),
    .b821-table td:nth-child(2) {
      width: 230px;
    }

    .b821-message-type {
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .b821-tree-details summary {
      cursor: pointer;
      font-weight: 800;
    }

    .b821-path-details summary {
      cursor: pointer;
      font-weight: 800;
    }

    .b821-path-list {
      max-height: 360px;
      margin-top: 8px;
      overflow: auto;
      border: 1px solid #cfcfcf;
      background: #ffffff;
      padding: 6px 0;
      font-family: Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.38;
    }

    .b821-path-line {
      padding-left: calc(var(--depth) * 16px + 8px);
      padding-right: 8px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .b821-path-line.handover-hit {
      color: #b00000;
      font-weight: 800;
    }

    .b821-path-line.field-hit {
      background: #fff0f0;
      color: #b00000;
      font-weight: 800;
    }

    .b821-tree {
      max-height: 360px;
      margin-top: 8px;
      overflow: auto;
      border: 1px solid #cfcfcf;
      background: #ffffff;
      padding: 6px 0;
      font-family: Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.38;
    }

    .b821-tree-line {
      padding-left: calc(var(--depth) * 16px + 8px);
      padding-right: 8px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .b821-tree-line.handover-hit {
      color: #b00000;
      font-weight: 800;
    }

    .b821-tree-line.field-hit {
      background: #fff0f0;
      color: #b00000;
      font-weight: 800;
    }

    .handover-note {
      color: #7a0000;
      font-size: 11px;
      font-weight: 800;
    }

    .muted {
      color: #555555;
    }

    .viewer-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
    }

    .viewer-bar {
      width: min(100vw - 32px, 2048px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-sizing: border-box;
    }

    .back-button {
      border: 2px solid #000000;
      border-radius: 6px;
      background: #ffffff;
      color: #000000;
      padding: 8px 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .view-title {
      font-size: 20px;
      font-weight: 800;
    }

    .placeholder-panel {
      width: min(560px, calc(100vw - 48px));
      border: 2px solid #000000;
      border-radius: 6px;
      padding: 24px;
      box-sizing: border-box;
      font-size: 24px;
      font-weight: 800;
    }

    @media (max-width: 760px) {
      .home-actions {
        grid-template-columns: 1fr;
      }
    }

    .figure {
      position: relative;
      width: min(100vw - 32px, calc((100vh - 78px) * 2048 / 1230), 2048px);
      aspect-ratio: 2048 / 1230;
      background: #ffffff;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .participant {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 48px;
      font-weight: 800;
      font-style: italic;
    }

    .layer {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 35px;
      font-weight: 800;
    }

    .msg {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 27px;
      font-weight: 400;
    }

    .msg.small {
      font-size: 25px;
    }

    .tag {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 23px;
      font-weight: 800;
    }

    .caption {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 52px;
      font-weight: 800;
    }

    .line {
      fill: none;
      stroke: #000000;
      stroke-width: 3.25;
      stroke-linecap: square;
      stroke-linejoin: miter;
      pointer-events: none;
    }

    .message-tail {
      fill: none;
      stroke: #000000;
      stroke-width: 3.25;
      stroke-linecap: square;
      stroke-linejoin: miter;
      pointer-events: none;
    }

    .message-body {
      fill: #ffffff;
      stroke: #000000;
      stroke-width: 2.3;
      stroke-linejoin: miter;
    }

    .message-divider {
      fill: none;
      stroke: #000000;
      stroke-width: 2.3;
      stroke-linecap: square;
      pointer-events: none;
    }

    .dashed-message {
      stroke-dasharray: 12 16;
    }

    .lifeline {
      fill: none;
      stroke: #000000;
      stroke-width: 3.1;
      stroke-linecap: square;
    }

    .dash {
      stroke-dasharray: 12 16;
      stroke-linecap: butt;
    }

    .box,
    .step-box {
      fill: #ffffff;
      stroke: #000000;
      stroke-width: 2.3;
    }

    .chip-box {
      fill: #ffffff;
      stroke: #000000;
      stroke-width: 2.3;
    }

    .step-label {
      cursor: pointer;
    }

    .step-label:hover .step-box,
    .step-label:hover .chip-box,
    .step-label:hover .message-body {
      fill: #f6f6f6;
    }

    .connector {
      fill: none;
      stroke: #000000;
      stroke-width: 2.3;
      stroke-linecap: square;
    }

    .popup {
      position: fixed;
      z-index: 10;
      display: none;
      width: min(680px, calc(100vw - 28px));
      max-height: calc(100vh - 28px);
      overflow: auto;
      background: #ffffff;
      border: 2px solid #000000;
      border-radius: 8px;
      box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.18);
      padding: 14px 16px 12px;
      color: #000000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .popup.open {
      display: block;
    }

    .popup-title {
      margin: 0 28px 8px 0;
      font-size: 20px;
      font-weight: 800;
    }

    .popup-row {
      margin-top: 7px;
      font-size: 15px;
      line-height: 1.35;
    }

    .popup-row b {
      font-weight: 800;
    }

    .popup-logcode-link,
    .popup-hot-field {
      color: #d60000;
      font-weight: 800;
    }

    .popup-logcode-link {
      border: 0;
      background: transparent;
      padding: 0 2px;
      font: inherit;
      text-decoration: underline;
      cursor: pointer;
    }

    .popup-logcode-link:hover {
      background: #ffe4e4;
    }

    .popup-close {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 24px;
      height: 24px;
      border: 0;
      background: #ffffff;
      font-size: 24px;
      line-height: 22px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="event-screen" id="event-screen">
      <div class="home-actions">
        <button class="home-entry" type="button" data-open-explorer="event">Event</button>
        <button class="home-entry" type="button" data-open-explorer="message">Message</button>
        <button class="home-entry" type="button" data-open-explorer="field">Field</button>
      </div>
    </section>

    <section class="explorer-screen" id="explorer-screen" hidden>
      <div class="viewer-bar">
        <button class="back-button" type="button" data-back-home>Home</button>
        <div class="view-title" id="explorer-title">Event</div>
      </div>
      <div class="explorer-grid">
        <section class="explorer-column" id="event-column">
          <h2 class="column-title">Event</h2>
          <div class="column-list">
            <button class="column-button" type="button" data-view="handover">Handover</button>
            <button class="column-button" type="button" data-view="registration">UE Registration</button>
          </div>
        </section>

        <section class="explorer-column" id="message-column">
          <h2 class="column-title">Message</h2>
          <div class="column-list">
            <button class="column-button" type="button" data-message-key="measurement-report">MeasurementReport</button>
            <button class="column-button" type="button" data-message-key="rrc-reconfig-sync">RRCReconfiguration w/ Sync</button>
            <button class="column-button" type="button" data-message-key="rrc-reconfig-complete">RRCReconfigurationComplete</button>
            <button class="column-button" type="button" data-message-key="random-access">Random Access</button>
          </div>
        </section>

        <section class="explorer-column" id="field-column">
          <h2 class="column-title">Field</h2>
          <div class="field-list muted" id="field-panel">Select a field.</div>
        </section>
      </div>
    </section>

    <section class="viewer-screen" id="handover-screen" hidden>
      <div class="viewer-bar">
        <button class="back-button" type="button" data-back-explorer>Event / Message</button>
        <div class="view-title">Handover</div>
      </div>
      <div class="figure" aria-label="Generic 5G NR handover sequence diagram with Source Cell, UE RRC, UE ML1, UE MAC, and Target Cell">
    <svg viewBox="0 0 2048 1230" role="img">
      <defs>
        <marker id="arrow" viewBox="0 0 12 12" refX="10.2" refY="6" markerWidth="11.5" markerHeight="11.5" orient="auto">
          <path d="M 0 0 L 12 6 L 0 12 z" fill="#000000"></path>
        </marker>

        <g id="phone">
          <rect x="-34" y="-52" width="68" height="104" rx="13" fill="#4d4d4d"></rect>
          <rect x="-27" y="-39" width="54" height="78" rx="4" fill="#ffffff"></rect>
          <rect x="-8" y="-47" width="16" height="3" rx="1.5" fill="#ffffff"></rect>
          <rect x="-11" y="42" width="22" height="5" rx="2.5" fill="#ffffff"></rect>
        </g>

        <g id="tower" stroke="#555555" stroke-width="4.2" fill="none" stroke-linecap="square" stroke-linejoin="miter">
          <path d="M 0 28 L -31 130"></path>
          <path d="M 0 28 L 31 130"></path>
          <path d="M -22 128 L 22 128"></path>
          <path d="M -22 96 L 20 111"></path>
          <path d="M 22 96 L -20 111"></path>
          <path d="M -15 67 L 16 79"></path>
          <path d="M 15 67 L -15 79"></path>
          <circle cx="0" cy="25" r="7" stroke-width="4.2"></circle>
          <path d="M -13 7 A 22 22 0 0 0 -13 43"></path>
          <path d="M 13 7 A 22 22 0 0 1 13 43"></path>
          <path d="M -23 -4 A 37 37 0 0 0 -23 54"></path>
          <path d="M 23 -4 A 37 37 0 0 1 23 54"></path>
          <path d="M -33 -15 A 52 52 0 0 0 -33 65"></path>
          <path d="M 33 -15 A 52 52 0 0 1 33 65"></path>
        </g>
      </defs>

      <rect width="2048" height="1230" fill="#ffffff"></rect>

      <!-- Participants -->
      <g transform="translate(210 40)">
        <use href="#tower"></use>
      </g>
      <text x="210" y="218" class="participant" text-anchor="middle">Source Cell</text>

      <use href="#phone" x="1120" y="112"></use>
      <text x="1120" y="218" class="participant" text-anchor="middle">UE</text>
      <rect x="610" y="250" width="930" height="72" rx="8" class="box"></rect>
      <text x="720" y="298" class="layer" text-anchor="middle">RRC</text>
      <text x="1120" y="298" class="layer" text-anchor="middle">ML1</text>
      <text x="1390" y="298" class="layer" text-anchor="middle">MAC</text>

      <g transform="translate(1850 40)">
        <use href="#tower"></use>
      </g>
      <text x="1850" y="218" class="participant" text-anchor="middle">Target Cell</text>

      <!-- Lifelines -->
      <path d="M 190 285 L 190 1112" class="lifeline"></path>
      <path d="M 720 322 L 720 1112" class="lifeline"></path>
      <path d="M 1120 322 L 1120 1112" class="lifeline"></path>
      <path d="M 1390 322 L 1390 1112" class="lifeline"></path>
      <path d="M 1880 285 L 1880 1112" class="lifeline"></path>

      <!-- Message arrows. The label and arrow are one shape. -->
      <g class="step-label" data-step="1">
        <path d="M 190 338 L 672 338 L 720 360 L 672 382 L 190 382 Z" class="message-body"></path>
        <path d="M 274 338 L 274 382" class="message-divider"></path>
        <text x="232" y="368" class="tag" text-anchor="middle">RRC</text>
        <text x="298" y="369" class="msg">1. Measurement Configuration</text>
      </g>

      <g class="step-label" data-step="2">
        <path d="M 700 410 L 1072 410 L 1120 432 L 1072 454 L 700 454 Z" class="message-body"></path>
        <path d="M 784 410 L 784 454" class="message-divider"></path>
        <text x="742" y="440" class="tag" text-anchor="middle">ML1</text>
        <text x="808" y="441" class="msg">2. Search / Measure</text>
      </g>

      <g class="step-label" data-step="3">
        <path d="M 238 482 L 720 482 L 720 526 L 238 526 L 190 504 Z" class="message-body"></path>
        <path d="M 322 482 L 322 526" class="message-divider"></path>
        <text x="280" y="512" class="tag" text-anchor="middle">RRC</text>
        <text x="346" y="513" class="msg">3. Measurement Report</text>
      </g>

      <g class="step-label" data-step="4">
        <path d="M 190 576 L 560 576" class="message-tail dashed-message"></path>
        <path d="M 560 554 L 1832 554 L 1880 576 L 1832 598 L 560 598 Z" class="message-body"></path>
        <path d="M 690 554 L 690 598" class="message-divider"></path>
        <text x="625" y="584" class="tag" text-anchor="middle">Network</text>
        <text x="715" y="585" class="msg small">4. Network HO Decision / Preparation</text>
      </g>

      <g class="step-label" data-step="5">
        <path d="M 190 626 L 672 626 L 720 648 L 672 670 L 190 670 Z" class="message-body"></path>
        <path d="M 274 626 L 274 670" class="message-divider"></path>
        <text x="232" y="656" class="tag" text-anchor="middle">RRC</text>
        <text x="298" y="657" class="msg">5. RRCReconfiguration w/ Sync</text>
      </g>

      <g class="step-label" data-step="6">
        <path d="M 700 698 L 1072 698 L 1120 720 L 1072 742 L 700 742 Z" class="message-body"></path>
        <path d="M 784 698 L 784 742" class="message-divider"></path>
        <text x="742" y="728" class="tag" text-anchor="middle">ML1</text>
        <text x="808" y="729" class="msg">6. Apply Target Config</text>
      </g>

      <g class="step-label" data-step="7">

        logcodes: ["0xB952"],

        logcodes: ["0xB889", "0xB88A"],

        logcodes: ["0xB9BF"],
        fields: ["Result", "ARFCN", "Cell Id", "RRCReconfigurationComplete"],
        confirm: "If no explicit RA success field appears, use Step 10 and 0x1FFB events as confirmation: EVENT_NR5G_RRC_HO_SUCCESS; EVENT_NR5G_RRC_NEW_CELL_IND_V2.",
        confirmLogcodes: ["0x1FFB"],

      },
      10: {

        layer: "RRC",
        decide: "UE confirms handover completion to target.",
        logcode: "0xB821 NR5G RRC OTA Packet -> U [NR] RRC Reconfiguration Complete. Fields: ul-dcch -> c1 -> rrcReconfigurationComplete, Physical Cell Id, Frequency, rrc-TransactionIdentifier.",
        logcodes: ["0xB821"],
        fields: ["ul-dcch", "c1", "rrcReconfigurationComplete", "Physical Cell Id", "Frequency", "rrc-TransactionIdentifier"],
        confirm: hoConfirmedBy,
        confirmLogcodes: ["0x1FFB"],
        confirmFields: hoConfirmedByEvents,
        identityLogcodes: ["0xB823", "0xB821"],
        identityFields: sourceTargetIdentityFields,
        identity: sourceTargetIdentity
      },
      11: {
        title: "11. Data Resumes",
        layer: "UP / Data",
        decide: "User-plane data resumes after handover.",
        logcode: "No single HO logcode. Infer from MAC/PDCP stats after HO: 0xB888 NR5G MAC PDSCH Stats fields Num PDSCH Decode, Num CRC Pass TB, TB Bytes; 0xB881 NR5G MAC UL TB Stats fields TB New Tx Bytes, Num ULSCH Sched.",
        logcodes: ["0xB888", "0xB881"],
        fields: ["Num PDSCH Decode", "Num CRC Pass TB", "TB Bytes", "TB New Tx Bytes", "Num ULSCH Sched"]
      }
    };
    const eventCatalog = window.EVENT_DATA || {};
    const currentEvent = eventCatalog.handover || {};
    const stepInfo = currentEvent.steps || fallbackStepInfo;

    const eventScreen = document.querySelector("#event-screen");
    const explorerScreen = document.querySelector("#explorer-screen");
    const handoverScreen = document.querySelector("#handover-screen");
    const registrationScreen = document.querySelector("#registration-screen");
    const explorerTitle = document.querySelector("#explorer-title");
    const explorerColumns = {
      event: document.querySelector("#event-column"),
      message: document.querySelector("#message-column"),
      field: document.querySelector("#field-column")
    };
    const eventList = document.querySelector("#event-column .column-list");
    const messageList = document.querySelector("#message-column .column-list");
    const fieldPanel = document.querySelector("#field-panel");

    const fallbackLogcodeStructure = {
      "0xB821 NR5G RRC OTA Packet": {
        "Event": null,
        "Length": null,
        "Log Code": null,
        "Timestamp": null,
        "NR5G RRC OTA Packet": {
          "ul-dcch": {
            "c1": {
              "measurementReport": {},
              "rrcReconfigurationComplete": {}
            }
          }
        }
      }
    };
    const logcodeStructure = window.HANDOVER_LOGCODE_STRUCTURE || fallbackLogcodeStructure;
    const b821FieldTreeTable = window.B821_FIELD_TREE_TABLE || [];
    const generatedLogcodeRecords = window.LOGCODE_RECORDS || null;

    function splitTitle(title) {
      const match = title.match(/^(0x[0-9A-Fa-f]+)\s+(.*)$/);
      return match ? { logcode: match[1], name: match[2] } : { logcode: "", name: title };
    }

    function normalizeLogcodeRecord(record) {
      const title = record.title || `${record.logcode} ${record.name}`;
      const parts = record.logcode && record.name ? record : splitTitle(title);
      return {
        id: record.id || title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, ""),
        title,
        logcode: record.logcode || parts.logcode,
        name: record.name || parts.name,
        category: record.category || "",
        detail: record.detail || {},
        fieldTreeTable: record.fieldTreeTable || null
      };
    }

    const messageData = generatedLogcodeRecords
      ? generatedLogcodeRecords.map(normalizeLogcodeRecord)
      : Object.entries(logcodeStructure).map(([title, detail]) => {
          const parts = splitTitle(title);
          return normalizeLogcodeRecord({
            id: title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, ""),
            title,
            logcode: parts.logcode,
            name: parts.name,
            detail,
            fieldTreeTable: parts.logcode.toLowerCase() === "0xb821" ? b821FieldTreeTable : null
          });
        });
    const messageDataById = new Map(messageData.map((record) => [record.id, record]));

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function uniqueList(values) {
      return [...new Set((values || []).filter(Boolean))];
    }

    function normalizeForMatch(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "");
    }

    function encodeTerms(terms) {
      return encodeURIComponent(JSON.stringify(uniqueList(terms)));
    }

    function decodeTerms(value) {
      try {
        return JSON.parse(decodeURIComponent(value || "%5B%5D"));
      } catch (error) {
        return [];
      }
    }

    function recordLabel(record) {
      return record.logcode ? `${record.logcode} ${record.name}` : record.name;
    }

    const handoverFieldTerms = new Set([
      "absoluteFrequencySSB",
      "ARFCN",
      "Carrier Id",
      "Cell Id",
      "CellQualityRsrp",
      "CellQualityRsrq",
      "CRNTI",
      "Event",
      "Frequency",
      "HANDOVER",
      "HANDOVER_END",
      "HANDOVER_START",
      "measConfig",
      "measId",
      "measIdToAddModList",
      "measObjectToAddModList",
      "measResultNeighCells",
      "measResults",
      "MeasurementReport",
      "masterKeyUpdate",
      "newUE-Identity",
      "nextHopChainingCount",
      "Physical Cell Id",
      "physCellId",
      "Rach Reason",
      "rach-ConfigDedicated",
      "RACH Contention",
      "reportConfigToAddModList",
      "reconfigurationWithSync",
      "Result",
      "rrcReconfiguration",
      "rrcReconfigurationComplete",
      "rsrp",
      "rsrq",
      "sinr",
      "spCellConfigCommon"
    ].map(normalizeForMatch));

    const handoverPatterns = [
      /handover/i,
      /random access/i,
      /\brauch\b/i,
      /reconfigurationWithSync/i,
      /rrcReconfiguration/i,
      /measurementReport/i
    ];

    function isPlainObject(value) {
      return value !== null && typeof value === "object" && !Array.isArray(value);
    }

    function parseTreeLine(line) {
      const indent = (line.match(/^ */) || [""])[0].length;
      const text = line.trim();
      if (!text) return null;

      const label = text.includes(" : ") ? text.split(" : ")[0].trim() : text;
      const isIndex = /^\[\*\]/.test(label) || /^\d+$/.test(label);
      return {
        level: Math.floor(indent / 2),
        label,
        text,
        isIndex
      };
    }

    function collectFieldTreeReferences(tableRows, record, index) {
      tableRows.forEach((row) => {
        const stack = [];
        row.tree.split("\n").forEach((line) => {
          const parsed = parseTreeLine(line);
          if (!parsed) return;

          stack.length = parsed.level;
          stack[parsed.level] = parsed.label;
          const pathParts = stack.slice(0, parsed.level + 1).filter((part) => part && part !== "[*]");
          if (!parsed.isIndex && isFieldIndexKey(parsed.label)) {
            addFieldReference(index, parsed.label, record, [
              row.message_type,
              ...pathParts
            ]);
          }
        });
      });
    }

    function isFieldIndexKey(key) {
      return Boolean(key) && key !== "[]" && !/^\d+$/.test(key);
    }

    function addFieldReference(index, key, record, pathParts) {
      const id = normalizeForMatch(key);
      if (!id) return;
      if (!index.has(id)) {
        index.set(id, {
          id,
          name: key,
          records: new Map()
        });
      }

      const field = index.get(id);
      if (!field.records.has(record.id)) {
        field.records.set(record.id, {
          record,
          paths: []
        });
      }
      field.records.get(record.id).paths.push(pathParts.join(" -> "));
    }

    function collectFieldReferences(value, record, index, pathParts = []) {
      if (Array.isArray(value)) {
        value.forEach((item) => collectFieldReferences(item, record, index, pathParts));
        return;
      }
      if (!isPlainObject(value)) return;

      Object.entries(value).forEach(([key, childValue]) => {
        const nextPath = pathParts.concat(key);
        if (isFieldIndexKey(key)) {
          addFieldReference(index, key, record, nextPath);
        }
        collectFieldReferences(childValue, record, index, nextPath);
      });
    }

    function buildFieldIndex(records) {
      const index = new Map();
      records.forEach((record) => {
        if (record.fieldTreeTable && record.fieldTreeTable.length) {
          collectFieldTreeReferences(record.fieldTreeTable, record, index);
        } else {
          collectFieldReferences(record.detail, record, index);
        }
      });
      return [...index.values()]
        .map((field) => ({
          ...field,
          records: [...field.records.values()].sort((a, b) => recordLabel(a.record).localeCompare(recordLabel(b.record)))
        }))
        .sort((a, b) => a.name.localeCompare(b.name));
    }

    function hydrateGeneratedFieldIndex(fields) {
      return fields.map((field) => ({
        id: field.id,
        name: field.name,
        records: (field.records || [])
          .map((entry) => {
            const record = messageDataById.get(entry.id);
            if (!record) return null;
            return {
              record,
              paths: entry.paths || []
            };
          })
          .filter(Boolean)
      })).filter((field) => field.records.length);
    }

    const fieldIndexList = window.FIELD_TO_LOGCODES
      ? hydrateGeneratedFieldIndex(window.FIELD_TO_LOGCODES)
      : buildFieldIndex(messageData);
    const fieldIndexMap = new Map(fieldIndexList.map((field) => [field.id, field]));

    let activeDetailTerms = [];

    function isHandoverRelated(pathParts) {
      const text = pathParts.join(" ");
      const hasDirectField = pathParts.some((part) => handoverFieldTerms.has(normalizeForMatch(part)));
      return hasDirectField || handoverPatterns.some((pattern) => pattern.test(text));
    }

    function isDetailHighlighted(matchParts) {
      if (!activeDetailTerms.length) return false;
      const normalizedParts = matchParts.map(normalizeForMatch).filter(Boolean);
      const normalizedPath = normalizeForMatch(matchParts.join(" "));
      return activeDetailTerms.some((term) => {
        const normalizedTerm = normalizeForMatch(term);
        if (!normalizedTerm) return false;
        return normalizedParts.includes(normalizedTerm) || normalizedPath === normalizedTerm;
      });
    }

    function jsonLine(depth, pathParts, html, matchParts = pathParts.slice(-1)) {
      const hitClass = isHandoverRelated(matchParts) ? " handover-hit" : "";
      const fieldClass = isDetailHighlighted(matchParts) ? " field-hit" : "";
      return `<div class="json-line${hitClass}${fieldClass}" style="--depth: ${depth}">${html}</div>`;
    }

    function renderHandoverNote(matchParts) {
      if (isDetailHighlighted(matchParts)) {
        return ' <span class="handover-note">(selected handover field)</span>';
      }
      if (isHandoverRelated(matchParts)) {
        return ' <span class="handover-note">(handover-related)</span>';
      }
      return "";
    }

    function renderJsonNode(key, value, depth, pathParts) {
      const nextPath = pathParts.concat(key);
      const keyHtml = `<span class="json-key">"${escapeHtml(key)}"</span>`;

      if (value === null) {
        return jsonLine(depth, nextPath, keyHtml);
      }

      if (Array.isArray(value)) {
        if (value.length === 0) {
          return jsonLine(depth, nextPath, `${keyHtml}: []`);
        }
        const children = value
          .map((item, index) => renderJsonNode(String(index), item, depth + 1, nextPath))
          .join("");
        return [
          jsonLine(depth, nextPath, `${keyHtml}: [`),
          children,
          jsonLine(depth, nextPath, "]", [])
        ].join("");
      }

      if (isPlainObject(value)) {
        const entries = Object.entries(value);
        if (entries.length === 0) {
          return jsonLine(depth, nextPath, `${keyHtml}: {}`);
        }
        const children = entries
          .map(([childKey, childValue]) => renderJsonNode(childKey, childValue, depth + 1, nextPath))
          .join("");
        return [
          jsonLine(depth, nextPath, `${keyHtml}: {`),
          children,
          jsonLine(depth, nextPath, "}", [])
        ].join("");
      }

      return jsonLine(
        depth,
        nextPath.concat(String(value)),
        `${keyHtml}: ${escapeHtml(JSON.stringify(value))}`,
        [key, String(value)]
      );
    }

    function renderB821TreeLine(line) {
      const parsed = parseTreeLine(line);
      if (!parsed) return "";

      const hitClass = isHandoverRelated([parsed.label, parsed.text]) ? " handover-hit" : "";
      const fieldClass = isDetailHighlighted([parsed.label]) ? " field-hit" : "";
      return `<div class="b821-tree-line${hitClass}${fieldClass}" style="--depth: ${parsed.level}">${escapeHtml(parsed.text)}${renderHandoverNote([parsed.label])}</div>`;
    }

    function b821RowHasHighlightedField(row) {
      return row.tree.split("\n").some((line) => {
        const parsed = parseTreeLine(line);
        return parsed && isDetailHighlighted([parsed.label]);
      });
    }

    function renderB821UniquePathTree(row) {
      const stack = [];

      return row.tree.split("\n").map((line) => {
        const parsed = parseTreeLine(line);
        if (!parsed) return "";

        stack.length = parsed.level;
        stack[parsed.level] = parsed.label;

        const hitClass = isHandoverRelated([parsed.label, parsed.text]) ? " handover-hit" : "";
        const fieldClass = isDetailHighlighted([parsed.label]) ? " field-hit" : "";
        return `<div class="b821-path-line${hitClass}${fieldClass}" style="--depth: ${parsed.level}">${escapeHtml(parsed.label)}${renderHandoverNote([parsed.label])}</div>`;
      }).join("");
    }

    function renderB821FieldTreeTable(record, highlightTerms = []) {
      activeDetailTerms = uniqueList(highlightTerms);
      const rows = record.fieldTreeTable || [];

      return [
        '<div class="b821-structure">',
        `<div class="b821-note">0xB821 NR5G RRC OTA Packet field paths. Open Field paths to inspect the merged path tree.</div>`,
        '<div class="b821-table-wrap">',
        '<table class="b821-table">',
        '<thead><tr><th>pdu_type</th><th>message type</th><th>field paths</th></tr></thead>',
        '<tbody>',
        rows.map((row) => {
          const pathOpenAttr = b821RowHasHighlightedField(row) ? " open" : "";
          const pathHtml = renderB821UniquePathTree(row);
          return [
            "<tr>",
            `<td>${row.pdu_type}</td>`,
            `<td class="b821-message-type">${escapeHtml(row.message_type)}</td>`,
            `<td><details class="b821-path-details"${pathOpenAttr}><summary>Field paths</summary><div class="b821-path-list">${pathHtml}</div></details></td>`,
            "</tr>"
          ].join("");
        }).join(""),
        "</tbody>",
        "</table>",
        "</div>",
        "</div>"
      ].join("");
    }

    function renderRecordTree(record, highlightTerms = []) {
      if (record.fieldTreeTable && record.fieldTreeTable.length) {
        return renderB821FieldTreeTable(record, highlightTerms);
      }

      activeDetailTerms = uniqueList(highlightTerms);
      return [
        '<div class="json-tree">',
        jsonLine(0, [], "{", []),
        renderJsonNode(record.title, record.detail, 1, []),
        jsonLine(0, [], "}", []),
        "</div>"
      ].join("");
    }

    function renderMessageList() {
      messageList.innerHTML = messageData
        .map((record) => {
          return `<button class="column-button" type="button" data-message-key="${escapeHtml(record.id)}">${escapeHtml(recordLabel(record))}</button>`;
        })
        .join("");
    }

    function renderEventList() {
      const events = window.EVENT_INDEX || [
        { id: "handover", title: "Handover", view: "handover" },
        { id: "ue_registration", title: "UE Registration", view: "registration" }
      ];
      eventList.innerHTML = events
        .map((eventItem) => {
          return `<button class="column-button" type="button" data-view="${escapeHtml(eventItem.view)}" data-event-id="${escapeHtml(eventItem.id)}">${escapeHtml(eventItem.title)}</button>`;
        })
        .join("");
    }

    function findMessageRecord(messageKey) {
      return messageData.find((record) => record.id === messageKey);
    }

    function findMessageRecordByLogcode(logcode) {
      return messageData.find((record) => record.logcode.toLowerCase() === String(logcode).toLowerCase());
    }

    function selectMessageRecord(messageKey) {
      messageList.querySelectorAll("[data-message-key]").forEach((item) => {
        item.classList.toggle("is-selected", item.dataset.messageKey === messageKey);
      });
    }

    function renderFields(messageKey, highlightTerms = []) {
      const record = findMessageRecord(messageKey);
      if (!record) {
        activeDetailTerms = [];
        fieldPanel.classList.add("muted");
        fieldPanel.textContent = "Select a field.";
        return;
      }
      fieldPanel.classList.remove("muted");
      fieldPanel.innerHTML = [
        '<button class="field-index-back" type="button" data-field-index-back>All fields</button>',
        `<div class="field-item">${renderRecordTree(record, highlightTerms)}</div>`
      ].join("");
      fieldPanel.scrollTop = 0;
      selectMessageRecord(messageKey);
    }

    function renderAllFields() {
      activeDetailTerms = [];
      fieldPanel.classList.remove("muted");
      fieldPanel.innerHTML = fieldIndexList
        .map((field) => {
          const hitClass = isHandoverRelated([field.name]) ? " handover-field" : "";
          const countLabel = `${field.records.length} logcode${field.records.length === 1 ? "" : "s"}`;
          return `<button class="field-record-button${hitClass}" type="button" data-field-key="${escapeHtml(field.id)}">${escapeHtml(field.name)} <span class="field-match-count">${escapeHtml(countLabel)}</span></button>`;
        })
        .join("");
      fieldPanel.scrollTop = 0;
    }

    function renderFieldMatches(fieldKey) {
      const field = fieldIndexMap.get(fieldKey);
      if (!field) {
        renderAllFields();
        return;
      }
      activeDetailTerms = [];
      fieldPanel.classList.remove("muted");
      fieldPanel.innerHTML = [
        '<button class="field-index-back" type="button" data-field-index-back>All fields</button>',
        `<div class="field-match-title">${escapeHtml(field.name)}<div class="field-match-count">${field.records.length} matching logcode${field.records.length === 1 ? "" : "s"}</div></div>`,
        ...field.records.map(({ record, paths }) => {
          const pathCount = paths.length;
          return `<button class="field-record-button" type="button" data-field-message-key="${escapeHtml(record.id)}" data-highlight="${escapeHtml(encodeTerms([field.name]))}">${escapeHtml(recordLabel(record))} <span class="field-match-count">${pathCount} path${pathCount === 1 ? "" : "s"}</span></button>`;
        })
      ].join("");
      fieldPanel.scrollTop = 0;
    }

    function showExplorerPage(columnName) {
      explorerScreen.classList.toggle("is-field-view", columnName === "field");
      Object.entries(explorerColumns).forEach(([name, column]) => {
        column.hidden = name !== columnName;
        column.classList.toggle("is-active", name === columnName);
      });
      explorerTitle.textContent = columnName.charAt(0).toUpperCase() + columnName.slice(1);
      if (columnName === "field" && fieldPanel.classList.contains("muted")) {
        renderAllFields();
      }
      showScreen("explorer");
    }

    function showScreen(screen) {
      eventScreen.hidden = screen !== "home";
      explorerScreen.hidden = screen !== "explorer";
      handoverScreen.hidden = screen !== "handover";
      registrationScreen.hidden = screen !== "registration";
    }

    document.querySelectorAll("[data-open-explorer]").forEach((button) => {
      button.addEventListener("click", () => {
        if (button.dataset.openExplorer === "field") {
          renderAllFields();
        }
        showExplorerPage(button.dataset.openExplorer);
      });
    });

    eventList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-view]");
      if (!button) return;
      showScreen(button.dataset.view);
    });

    messageList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-message-key]");
      if (!button) return;
      messageList.querySelectorAll("[data-message-key]").forEach((item) => item.classList.remove("is-selected"));
      button.classList.add("is-selected");
      renderFields(button.dataset.messageKey);
      showExplorerPage("field");
    });

    renderEventList();
    renderMessageList();

    fieldPanel.addEventListener("click", (event) => {
      const backButton = event.target.closest("[data-field-index-back]");
      if (backButton) {
        renderAllFields();
        return;
      }

      const fieldButton = event.target.closest("[data-field-key]");
      if (fieldButton) {
        renderFieldMatches(fieldButton.dataset.fieldKey);
        return;
      }

      const messageButton = event.target.closest("[data-field-message-key]");
      if (messageButton) {
        renderFields(messageButton.dataset.fieldMessageKey, decodeTerms(messageButton.dataset.highlight));
      }
    });

    document.querySelectorAll("[data-back-home]").forEach((button) => {
      button.addEventListener("click", () => {
        showScreen("home");
      });
    });

    document.querySelectorAll("[data-back-explorer]").forEach((button) => {
      button.addEventListener("click", () => {
        showExplorerPage("event");
      });
    });

    const popup = document.querySelector("#step-popup");
    const popupTitle = popup.querySelector(".popup-title");
    const popupClose = popup.querySelector(".popup-close");
    const fields = {
      layer: popup.querySelector('[data-field="layer"]'),
      decide: popup.querySelector('[data-field="decide"]'),
      logcode: popup.querySelector('[data-field="logcode"]'),
      confirm: popup.querySelector('[data-field="confirm"]'),
      identity: popup.querySelector('[data-field="identity"]')
    };
    const fieldRows = {
      layer: popup.querySelector('[data-row="layer"]'),
      decide: popup.querySelector('[data-row="decide"]'),
      logcode: popup.querySelector('[data-row="logcode"]'),
      confirm: popup.querySelector('[data-row="confirm"]'),
      identity: popup.querySelector('[data-row="identity"]')
    };

    function popupRowConfig(info, name) {
      if (name === "confirm") {
        return {
          logcodes: info.confirmLogcodes || [],
          fields: info.confirmFields || []
        };
      }
      if (name === "identity") {
        return {
          logcodes: info.identityLogcodes || [],
          fields: info.identityFields || []
        };
      }
      if (name === "logcode") {
        return {
          logcodes: info.logcodes || [],
          fields: info.fields || []
        };
      }
      return { logcodes: [], fields: [] };
    }

    function renderPopupRichText(text, info, name) {
      const config = popupRowConfig(info, name);
      const tokens = [
        ...config.logcodes.map((code) => ({
          text: code,
          html: (match) => `<button class="popup-logcode-link" type="button" data-logcode-link="${escapeHtml(code)}" data-highlight="${escapeHtml(encodeTerms(config.fields))}">${escapeHtml(match)}</button>`
        })),
        ...config.fields.map((fieldName) => ({
          text: fieldName,
          html: (match) => `<span class="popup-hot-field">${escapeHtml(match)}</span>`
        }))
      ]
        .filter((token) => token.text)
        .sort((a, b) => b.text.length - a.text.length);

      if (!tokens.length) return escapeHtml(text);

      let html = "";
      let index = 0;
      while (index < text.length) {
        const token = tokens.find((candidate) => {
          return text.slice(index, index + candidate.text.length).toLowerCase() === candidate.text.toLowerCase();
        });
        if (token) {
          html += token.html(text.slice(index, index + token.text.length));
          index += token.text.length;
        } else {
          html += escapeHtml(text[index]);
          index += 1;
        }
      }
      return html;
    }

    function setPopupField(name, value, info) {
      const hasValue = Boolean(value);
      if (["logcode", "confirm", "identity"].includes(name)) {
        fields[name].innerHTML = hasValue ? renderPopupRichText(value, info, name) : "";
      } else {
        fields[name].textContent = value || "";
      }
      fieldRows[name].hidden = !hasValue;
    }

    function openMessageDetailFromPopup(logcode, highlightTerms) {
      const record = findMessageRecordByLogcode(logcode);
      if (!record) return;
      popup.classList.remove("open");
      renderFields(record.id, highlightTerms);
      showExplorerPage("field");
    }

    function showPopup(event, step) {
      const info = stepInfo[step];
      if (!info) return;

      popupTitle.textContent = info.title;
      setPopupField("layer", info.layer, info);
      setPopupField("decide", info.decide, info);
      setPopupField("logcode", info.logcode, info);
      setPopupField("confirm", info.confirm, info);
      setPopupField("identity", info.identity, info);

      popup.classList.add("open");

      const gap = 14;
      const rect = popup.getBoundingClientRect();
      let left = event.clientX + gap;
      let top = event.clientY + gap;

      if (left + rect.width > window.innerWidth - gap) {
        left = window.innerWidth - rect.width - gap;
      }
      if (top + rect.height > window.innerHeight - gap) {
        top = event.clientY - rect.height - gap;
      }
      if (top < gap) top = gap;
      if (left < gap) left = gap;

      popup.style.left = `${left}px`;
      popup.style.top = `${top}px`;
    }

    document.querySelectorAll(".step-label").forEach((label) => {
      label.addEventListener("click", (event) => {
        event.stopPropagation();
        showPopup(event, label.dataset.step);
      });
    });

    popup.addEventListener("click", (event) => {
      event.stopPropagation();
      const link = event.target.closest("[data-logcode-link]");
      if (!link) return;
      openMessageDetailFromPopup(link.dataset.logcodeLink, decodeTerms(link.dataset.highlight));
    });
    popupClose.addEventListener("click", () => popup.classList.remove("open"));
    document.addEventListener("click", () => {
      popup.classList.remove("open");
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") popup.classList.remove("open");
    });
  </script>
</body>
</html>
